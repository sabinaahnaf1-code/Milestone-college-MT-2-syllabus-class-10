<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MT-2 Syllabus Tracker</title>
    <script>
      // MUST RUN BEFORE ANY OTHER SCRIPTS
      // This is a more aggressive shim for the read-only fetch property in sandboxed iframes
      (function() {
        var originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return originalFetch; },
            set: function(v) { 
              if (v !== originalFetch) {
                console.warn('Blocked attempt to overwrite window.fetch with:', v);
              }
              return originalFetch;
            }
          });
        } catch (e) {
          // Fallback: if we can't redefine it, we try to at least catch the assignment error globally
          window.addEventListener('error', function(event) {
            if (event.error && event.error.message && event.error.message.includes('Cannot set property fetch')) {
              event.preventDefault();
              console.warn('Caught and suppressed fetch overwrite error');
            }
          }, true);
        }

        // Shim for JSON.parse("undefined") which is a common error in some libraries
        var originalParse = JSON.parse;
        JSON.parse = function(text, reviver) {
          if (typeof text === 'string') {
            var trimmed = text.trim();
            if (trimmed === "undefined" || trimmed === "") {
              console.warn('Blocked attempt to parse invalid JSON string:', text);
              return undefined;
            }
          } else if (text === undefined) {
            console.warn('Blocked attempt to parse undefined value as JSON');
            return undefined;
          }
          
          try {
            return originalParse(text, reviver);
          } catch (e) {
            if (typeof text === 'string' && text.includes('undefined')) {
               console.warn('Blocked attempt to parse string containing undefined as JSON:', text);
               return undefined;
            }
            throw e;
          }
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
